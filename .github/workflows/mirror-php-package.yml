name: Mirror PHP package
description: 'Mirrors a PHP package to a mirror repository to be released to Packagist.org.'
on:
    workflow_dispatch:
        inputs:
            package:
                description: 'Enter package name to mirror (e.g. @woocommerce/email-editor-config}). It must refer to a name defined in the package.json file of the package in the packages/php directory.'
                required: true

permissions: {}

jobs:
    mirror:
        name: Run packages release script
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout monorepo
              uses: actions/checkout@v4

            - name: Build package for mirroring
              run: |
                  pnpm --filter "@woocommerce/${{ github.event.inputs.package }}" build:composer-package

            - name: Grab package build directory
              run: echo "mirror_dir=$( pnpm --filter @woocommerce/${{ github.event.inputs.package }} list --json | jq --compact-output '.[]' | jq --raw-output '( .path + "/build")' )" >> $GITHUB_ENV

            - name: Push to mirror
              uses: Automattic/action-push-to-mirrors@v2.2.2
              with:
                  token: ${{ secrets.API_TOKEN_GITHUB }}
                  username: woocommercebot
                  working-directory: ${{ env.mirror_dir }}
                  commit-message: 'Mirror package ${{ github.event.inputs.package }} from WooCommerce'
              timeout-minutes: 5 # Normally should take up to 30 seconds
