name: Mirror PHP package
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Enter package name to mirror (e.g. email-editor). It must refer to a package in the packages/php directory.'
        required: true

permissions: { }

jobs:
  mirror:
    name: Run packages release script
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check if package exists
        id: check-package
        run: |
          if [ ! -d "packages/php/${{ github.event.inputs.package }}" ]; then
            echo "Package ${{ github.event.inputs.package }} does not exist in packages/php"
            exit 1
          fi

      - name: Setup mirror directory structure
        run: |
          # Create working directory for mirrors
          mkdir -p mirror-working-dir
          
          # Create mirrors.txt file with target repository
          echo "costasovo/${{ github.event.inputs.package }}" > mirror-working-dir/mirrors.txt
          
          # Create subdirectory for the mirror repository
          mkdir -p "mirror-working-dir/costasovo/${{ github.event.inputs.package }}"
          
          # Copy package content to mirror directory
          cp -r "packages/php/${{ github.event.inputs.package }}"/* "mirror-working-dir/costasovo/${{ github.event.inputs.package }}/"
          
          # Copy any hidden files
          cp -r "packages/php/${{ github.event.inputs.package }}/".* "mirror-working-dir/costasovo/${{ github.event.inputs.package }}/" 2>/dev/null || true

      - name: Check if cleanup script exists
        id: check-cleanup-script
        run: |
          if [ -f "./packages/php/${{ github.event.inputs.package }}/tasks/mirror_cleanup.sh" ]; then
            echo "cleanup_script_exists=true" >> $GITHUB_OUTPUT
          else
            echo "cleanup_script_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Cleanup mirror directory
        if: steps.check-cleanup-script.outputs.cleanup_script_exists == 'true'
        run: |
          chmod +x "./packages/php/${{ github.event.inputs.package }}/tasks/mirror_cleanup.sh"
          ./packages/php/${{ github.event.inputs.package }}/tasks/mirror_cleanup.sh "mirror-working-dir/costasovo/${{ github.event.inputs.package }}"
      
      - name: Push to mirror
        uses: Automattic/action-push-to-mirrors@trunk
        with:
          token: ${{ secrets.API_TOKEN_GITHUB }}
          username: costasovo
          working-directory: mirror-working-dir
          commit-message: "Mirror package ${{ github.event.inputs.package }} from WooCommerce"
        timeout-minutes: 5